<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chest Calculator — CapyCalc</title>
<meta name="robots" content="noindex">
<link rel="icon" href="https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/logo.png">
<style>
/* ── Base palette (matches main CapyCalc) ── */
:root {
  --bg:      #0f1117;
  --bg2:     #161b26;
  --bg3:     #1e2535;
  --bg4:     #252d3d;
  --bg5:     #2c3650;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #e8ecf4;
  --text2:   #8b95a8;
  --text3:   #5a6373;
  --acc:     #4f7ef8;
  --acc2:    rgba(79,126,248,0.13);
  --acc3:    rgba(79,126,248,0.4);
  --gold:    #f0b429;
  --gold2:   rgba(240,180,41,0.10);
  --gold3:   rgba(240,180,41,0.30);
  --green:   #3ecf8e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 54px;
}
.hdr-logo { display: flex; align-items: center; gap: 10px; }
.hdr-logo img { width: 28px; height: 28px; border-radius: 4px; }
.hdr-title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

/* ── Layout ── */
.layout { display: flex; min-height: calc(100vh - 54px); }
nav.sidebar {
  width: 190px;
  min-width: 190px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 10px;
  position: sticky;
  top: 54px;
  height: calc(100vh - 54px);
  overflow-y: auto;
}
.nav-group {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0 8px;
  margin: 14px 0 5px;
}
.nav-group:first-child { margin-top: 0; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 8px;
  background: transparent;
  border: none;
  border-radius: 7px;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.12s;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--acc2); color: var(--acc); font-weight: 500; }

/* ── Main ── */
main {
  flex: 1;
  overflow-y: auto;
  height: calc(100vh - 54px);
  padding: 24px 28px;
  scrollbar-width: thin;
}
.panel { display: none; }
.panel.active {
  display: block;
  padding-bottom: 200px;
}
.page-title, .page-sub, .col-span { column-span: all; }
.page-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.page-sub {
  color: var(--text3);
  font-size: 12px;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

/* Panel-specific column-count override */
#panel-chestcalc.active { max-width: 900px; }

/* Mobile: collapse sidebar */
@media (max-width: 700px) {
  .layout { flex-direction: column; }
  nav.sidebar {
    width: 100%;
    min-width: 0;
    height: auto;
    position: static;
    padding: 8px 10px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    border-right: 0;
    border-bottom: 1px solid var(--border);
  }
  .nav-group { display: none; }
  .nav-item { width: auto; white-space: nowrap; }
  main { height: auto; padding: 16px; }
}

/* ─────────────────────────────────────────────────────────────────────────── */
/* CALCULATOR STYLES (copied verbatim from production index.html)              */
/* ─────────────────────────────────────────────────────────────────────────── */
/* ── Chest Calculator ── */
.chest-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.chest-section-hdr {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.chest-section-hdr-with-action {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.chest-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
}
.chest-reset-inline {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 5px;
  padding: 3px 8px;
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.chest-reset-inline:hover {
  background: var(--bg4);
  color: var(--text);
  border-color: var(--acc);
}
.chest-inputs-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
@media (max-width: 700px) {
  .chest-inputs-grid { grid-template-columns: repeat(2, 1fr); }
}
.chest-input-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.chest-img {
  width: 48px;
  height: 48px;
  object-fit: contain;
  margin-bottom: 2px;
}
.chest-img-sm {
  width: 24px;
  height: 24px;
  object-fit: contain;
  vertical-align: middle;
}
.chest-input-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
}
.chest-input-pts {
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 4px;
}
.chest-input-num {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 5px;
  padding: 4px 6px;
  font-family: ui-monospace, monospace;
  font-size: 12px;
  text-align: center;
}
.chest-input-num:focus { outline: none; border-color: var(--acc); }

.chest-bar-state-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
}
@media (max-width: 600px) {
  .chest-bar-state-grid { grid-template-columns: 1fr; }
}
.chest-bar-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.chest-bar-label {
  font-size: 11px;
  color: var(--text2);
  font-weight: 600;
}
.chest-bar-field select,
.chest-bar-field input[type="number"] {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 12px;
}
.chest-bar-field select:focus,
.chest-bar-field input[type="number"]:focus { outline: none; border-color: var(--acc); }
.chest-bar-hint { font-size: 10px; color: var(--text3); }

.chest-result-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
@media (max-width: 600px) {
  .chest-result-summary { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 380px) {
  .chest-result-summary { grid-template-columns: 1fr; }
}
.chest-stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  text-align: center;
}
.chest-stat-val {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  font-family: ui-monospace, monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chest-stat-lbl {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}
.chest-stat-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
  font-family: ui-monospace, monospace;
}
.chest-gem-img {
  width: 22px;
  height: 22px;
  object-fit: contain;
  vertical-align: -5px;
  margin-left: 2px;
}

/* Breakdown list rows — used by Pet Growth and similar calculators that want a
   simple "label → number" row list with optional total/warning row styling. */
.chest-breakdown-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.chest-breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
}
.chest-breakdown-row > span:first-child {
  color: var(--text2);
}
.chest-breakdown-row > span:last-child {
  color: var(--text);
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.chest-breakdown-row.chest-breakdown-total {
  background: var(--bg2);
  border-color: var(--accent);
}
.chest-breakdown-row.chest-breakdown-total > span:first-child,
.chest-breakdown-row.chest-breakdown-total > span:last-child {
  color: var(--text);
  font-weight: 700;
}
.chest-breakdown-row.chest-breakdown-leftover {
  border-color: rgba(245, 158, 11, 0.4);
}
.chest-breakdown-row.chest-breakdown-leftover > span:last-child {
  color: #f59e0b;
}


/* CGE toggle styling */
.chest-section-hdr-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.chest-toggle {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
}
.chest-toggle input { opacity: 0; width: 0; height: 0; }
.chest-toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s;
}
.chest-toggle-slider::before {
  content: "";
  position: absolute;
  height: 14px;
  width: 14px;
  left: 2px;
  top: 2px;
  background: var(--text2);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.chest-toggle input:checked + .chest-toggle-slider {
  background: var(--acc);
  border-color: var(--acc);
}
.chest-toggle input:checked + .chest-toggle-slider::before {
  transform: translateX(16px);
  background: #fff;
}
.chest-cge-desc {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 12px;
  line-height: 1.5;
}

.chest-final-bar { }
.chest-final-bar-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  margin-bottom: 6px;
  color: var(--text);
}
.chest-final-bar-pts { font-family: ui-monospace, monospace; color: var(--text2); }
.chest-bar-track {
  height: 10px;
  background: var(--bg3);
  border-radius: 5px;
  overflow: hidden;
}
.chest-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #5fa9ff, #5fcf7e);
  transition: width 0.3s;
}

.chest-trace {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 8px;
}
.chest-trace summary {
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
}
.chest-trace summary:hover { color: var(--text); }
.chest-trace-list {
  margin: 10px 0 0;
  padding-left: 22px;
  font-size: 11px;
  color: var(--text2);
  max-height: 240px;
  overflow-y: auto;
}
.chest-trace-list li { margin-bottom: 3px; }

/* ── Pet Growth Calculator specific layout ── */
/* Section title icon (e.g. the pet egg image next to "Owned Eggs") */
.chest-section-title img.pg-section-icon {
  width: 28px;
  height: 28px;
  object-fit: contain;
  vertical-align: -8px;
  margin-right: 6px;
}
/* Two-column row that lets Owned Eggs sit beside Daily Free Eggs */
.pg-top-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.pg-top-row > .pg-half-card {
  margin-bottom: 0;
}
@media (max-width: 700px) {
  .pg-top-row { grid-template-columns: 1fr; }
}

/* Big highlighted "Total Points Earned" card — the headline result */
.pg-hero-card {
  background: linear-gradient(135deg, rgba(245, 158, 11, 0.18) 0%, rgba(245, 158, 11, 0.06) 100%);
  border: 2px solid rgba(245, 158, 11, 0.5);
  border-radius: 12px;
  padding: 22px 26px;
  margin-bottom: 14px;
  text-align: center;
}
.pg-hero-label {
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 700;
  margin-bottom: 8px;
}
.pg-hero-val {
  font-size: 56px;
  font-weight: 800;
  color: #f59e0b;
  letter-spacing: -1.5px;
  line-height: 1;
  font-family: ui-monospace, 'SF Mono', monospace;
  margin-bottom: 6px;
}
.pg-hero-sub {
  font-size: 13px;
  color: var(--text2);
}

/* Highlight Total Points row inside the breakdown list */
.chest-breakdown-row.chest-breakdown-points {
  background: rgba(245, 158, 11, 0.10);
  border-color: rgba(245, 158, 11, 0.4);
}
.chest-breakdown-row.chest-breakdown-points > span:first-child {
  color: var(--text);
  font-weight: 700;
}
.chest-breakdown-row.chest-breakdown-points > span:last-child {
  color: #f59e0b;
  font-weight: 800;
  font-size: 14px;
}

.chest-result-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.chest-result-table th,
.chest-result-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.chest-result-table th:nth-child(n+3),
.chest-result-table td:nth-child(n+3) {
  text-align: center;
}
.chest-result-table th {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  font-weight: 600;
}
.chest-result-table .chest-num {
  text-align: center;
  font-family: ui-monospace, monospace;
}
.chest-result-table .chest-earned { color: #5fcf7e; }
.chest-result-table .chest-earned-cge { color: #5fa9ff; }
.chest-result-table .chest-total {
  font-weight: 700;
  color: var(--text);
}

.chest-amethyst-note {
  font-size: 10px;
  color: var(--text3);
  font-style: italic;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}


@media (max-width: 700px) {
  .chest-result-summary { grid-template-columns: repeat(2, 1fr); }
}

</style>
</head>
<body>

<header>
  <div class="hdr-logo">
    <img src="https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/logo.png" alt="CapyCalc">
    <span class="hdr-title">CapyCalc</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-group">Other Tools</div>
    <button class="nav-item active">&#x1F4E6; Chest Calculator</button>
  </nav>

  <main>
    <div id="panel-chestcalc" class="panel active">
      <div id="chestcalc-content"></div>
    </div>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CALCULATOR LOGIC (copied verbatim from production index.html)
// ─────────────────────────────────────────────────────────────────────────────

// Some production helpers (custom modals) are stubbed for the standalone.
function showConfirm(msg, cb) { cb(window.confirm(msg)); }

// ══════════════════════════════════════════════════════
// CHEST CALCULATOR
// ══════════════════════════════════════════════════════
// Simulates opening the user's owned chests and tracking the rolling bonus bar.
// Each opened chest contributes points to the bar; when a stage fills, the
// player earns that stage's chest for free. The simulation feeds those free
// chests back in until no more progress can be made.

// Chest types and the points each one contributes when opened.
var CC_CHEST_TYPES = [
  { key: 'bronze',   label: 'Bronze Chest',   pts: 1,
    img: 'https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/chestcalc/bronzechest.png' },
  { key: 'silver',   label: 'Silver Chest',   pts: 10,
    img: 'https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/chestcalc/silverchest.png' },
  { key: 'gold',     label: 'Gold Chest',     pts: 20,
    img: 'https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/chestcalc/goldchest.png' },
  { key: 'pet',      label: 'Pet Chest',      pts: 50,
    img: 'https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/chestcalc/petchest.png' },
  { key: 'amethyst', label: 'Amethyst Chest', pts: 0,
    img: 'https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/chestcalc/amethystchest.png' }
];

// 9 bonus-bar stages, cycling in order. Each stage rewards a specific chest type.
var CC_BONUS_STAGES = [
  { reward: 'silver',   threshold: 20  },
  { reward: 'silver',   threshold: 30  },
  { reward: 'gold',     threshold: 40  },
  { reward: 'pet',      threshold: 80  },
  { reward: 'gold',     threshold: 60  },
  { reward: 'amethyst', threshold: 100 },
  { reward: 'gold',     threshold: 80  },
  { reward: 'pet',      threshold: 120 },
  { reward: 'amethyst', threshold: 180 }
];

// Chest Growth Event — optional parallel point counter
// 4 rounds × 5 tasks each. Tasks fire at 1k/2k/3k/4k/5k points cumulative
// within a round. Each task completion = +10 silver chests. Overflow on the
// 5k task carries into the next round at 0 pts. After 4 rounds the event is
// done — no further rewards.
var CGE_TASK_THRESHOLDS = [1000, 2000, 3000, 4000, 5000]; // cumulative within a round
var CGE_ROUND_TOTAL = 5000;                                // pts to clear a full round
var CGE_TOTAL_ROUNDS = 4;
var CGE_REWARD_SILVER_CHESTS = 10;                         // per task completed

// Persisted user state (mirrors the pattern from CC/TP state stores)
var CHEST_STATE = {
  inputs: { bronze: 0, silver: 0, gold: 0, pet: 0, amethyst: 0 },
  startStage: 1,           // 1-indexed for user friendliness (1..9)
  startPoints: 0,          // points already in the current stage
  cgeEnabled: false,       // is Chest Growth Event active?
  cgeRound: 1,             // 1..4 — current CGE round
  cgePoints: 0             // points accumulated in the current CGE round
};

(function loadChestState() {
  try {
    var raw = localStorage.getItem('capy.chestcalc');
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (saved.inputs) {
      Object.keys(saved.inputs).forEach(function(k) {
        if (k in CHEST_STATE.inputs) CHEST_STATE.inputs[k] = saved.inputs[k] || 0;
      });
    }
    if (typeof saved.startStage === 'number') CHEST_STATE.startStage = saved.startStage;
    if (typeof saved.startPoints === 'number') CHEST_STATE.startPoints = saved.startPoints;
    if (typeof saved.cgeEnabled === 'boolean') CHEST_STATE.cgeEnabled = saved.cgeEnabled;
    if (typeof saved.cgeRound === 'number') CHEST_STATE.cgeRound = saved.cgeRound;
    if (typeof saved.cgePoints === 'number') CHEST_STATE.cgePoints = saved.cgePoints;
  } catch (e) { /* ignore */ }
})();
function chestPersist() {
  try { localStorage.setItem('capy.chestcalc', JSON.stringify(CHEST_STATE)); } catch (e) {}
}

// ─── Core simulation ─────────────────────────────────────
// Input: { inputs: {bronze, silver, gold, pet, amethyst}, startStage (1-9), startPoints }
// Returns:
//   {
//     totalOpened: { bronze, silver, gold, pet, amethyst },
//     earnedFromBar: { silver, gold, pet, amethyst }, // free chests gained
//     totalPoints: number,                            // points that flowed through the bar
//     stagesCleared: number,                          // # of bar stages filled across the run
//     finalStage: 1-9,                                // stage index after the run
//     finalPoints: number,                            // partial fill on the final stage
//     finalThreshold: number,                         // threshold for the final stage
//     trace: array of stage-clear events for the breakdown UI
//   }
function chestCalcSimulate(state) {
  var owned = Object.assign({ bronze: 0, silver: 0, gold: 0, pet: 0, amethyst: 0 }, state.inputs);
  // Normalise — clip negatives, coerce to integers
  Object.keys(owned).forEach(function(k) {
    owned[k] = Math.max(0, Math.floor(+owned[k] || 0));
  });

  // Mileage tracker
  var stageIdx = Math.max(0, Math.min(8, ((state.startStage || 1) - 1)));
  var ptsInStage = Math.max(0, Math.min(CC_BONUS_STAGES[stageIdx].threshold - 1, Math.floor(+state.startPoints || 0)));

  // CGE tracker (only if enabled)
  var cgeEnabled = !!state.cgeEnabled;
  var cgeRound = Math.max(1, Math.min(CGE_TOTAL_ROUNDS, Math.floor(+state.cgeRound || 1)));
  var cgePoints = Math.max(0, Math.floor(+state.cgePoints || 0));
  if (cgePoints >= CGE_ROUND_TOTAL) cgePoints = CGE_ROUND_TOTAL - 1; // clamp
  // Track which tasks in the current round have already been claimed (true if cleared)
  // Each round has 5 tasks at 1000, 2000, 3000, 4000, 5000 pts.
  // We derive which are already cleared from the user's starting points.
  function tasksCompletedInRound(pts) {
    var n = 0;
    for (var i = 0; i < CGE_TASK_THRESHOLDS.length; i++) {
      if (pts >= CGE_TASK_THRESHOLDS[i]) n++;
    }
    return n;
  }
  var cgeTasksCompletedThisRound = tasksCompletedInRound(cgePoints);
  var cgeTasksCleared = 0;        // tasks cleared during THIS simulation
  var cgeSilverEarned = 0;        // silver chests earned from CGE this simulation
  var cgeFinishedAllRounds = false;

  var totalOpened = { bronze: 0, silver: 0, gold: 0, pet: 0, amethyst: 0 };
  var earnedFromBar = { silver: 0, gold: 0, pet: 0, amethyst: 0 };
  var earnedFromCGE = { silver: 0 };  // CGE only rewards silver chests
  var totalPoints = 0;
  var stagesCleared = 0;
  var trace = [];

  // Amethyst chests don't contribute points when opened (0 pt), so we don't
  // simulate opening them — we just carry the count through to the totals.
  var ownedAmethyst = owned.amethyst;
  owned.amethyst = 0;

  // Queue of chests still to open (start with user's owned amounts, ex amethyst)
  var queue = Object.assign({}, owned);

  // Map chest key → its point value
  var ptsMap = {};
  CC_CHEST_TYPES.forEach(function(t) { ptsMap[t.key] = t.pts; });

  // Helper: drain a number of points into the CGE counter, advancing rounds
  // and recording task completions. Returns # of silver chests earned in this call.
  function drainIntoCGE(pts) {
    if (!cgeEnabled || cgeFinishedAllRounds) return 0;
    var earnedSilvers = 0;
    while (pts > 0 && !cgeFinishedAllRounds) {
      var remainingInRound = CGE_ROUND_TOTAL - cgePoints;
      if (pts >= remainingInRound) {
        // Fill the rest of this round
        pts -= remainingInRound;
        cgePoints = CGE_ROUND_TOTAL;
        // Complete all unclaimed tasks in this round
        while (cgeTasksCompletedThisRound < CGE_TASK_THRESHOLDS.length) {
          cgeTasksCompletedThisRound++;
          cgeTasksCleared++;
          earnedSilvers += CGE_REWARD_SILVER_CHESTS;
          cgeSilverEarned += CGE_REWARD_SILVER_CHESTS;
        }
        // Advance to next round (overflow carries)
        if (cgeRound < CGE_TOTAL_ROUNDS) {
          cgeRound++;
          cgePoints = 0;
          cgeTasksCompletedThisRound = 0;
        } else {
          cgeFinishedAllRounds = true;
          // Discard any further points — event is over
          pts = 0;
        }
      } else {
        // Partial fill — may complete some tasks but not finish the round
        cgePoints += pts;
        pts = 0;
        // Claim any tasks the new total has crossed
        while (cgeTasksCompletedThisRound < CGE_TASK_THRESHOLDS.length
               && cgePoints >= CGE_TASK_THRESHOLDS[cgeTasksCompletedThisRound]) {
          cgeTasksCompletedThisRound++;
          cgeTasksCleared++;
          earnedSilvers += CGE_REWARD_SILVER_CHESTS;
          cgeSilverEarned += CGE_REWARD_SILVER_CHESTS;
        }
      }
    }
    return earnedSilvers;
  }

  // Process queue in waves. We open all currently-queued chests, feed their
  // points into the bar (which may earn more chests) AND into CGE if enabled
  // (which awards silver chests). Both rewards feed back into the next wave.
  var safety = 0;
  while (safety++ < 10000) {
    // Sum the points from everything currently in the queue
    var wavePoints = 0;
    var anyChests = false;
    Object.keys(queue).forEach(function(k) {
      var n = queue[k] || 0;
      if (n > 0) {
        anyChests = true;
        totalOpened[k] += n;
        wavePoints += n * (ptsMap[k] || 0);
        queue[k] = 0;
      }
    });
    if (!anyChests) break;
    totalPoints += wavePoints;

    // CGE: drain the same wave points into the CGE counter (parallel track)
    var cgeSilversThisWave = drainIntoCGE(wavePoints);

    // Mileage: drain wavePoints into the bar, filling stages as we go
    var earnedThisWave = { silver: 0, gold: 0, pet: 0, amethyst: 0 };
    while (wavePoints > 0) {
      var stage = CC_BONUS_STAGES[stageIdx];
      var need = stage.threshold - ptsInStage;
      if (wavePoints >= need) {
        wavePoints -= need;
        ptsInStage = 0;
        stagesCleared++;
        earnedThisWave[stage.reward] = (earnedThisWave[stage.reward] || 0) + 1;
        earnedFromBar[stage.reward] = (earnedFromBar[stage.reward] || 0) + 1;
        trace.push({ stageIdx: stageIdx, reward: stage.reward, threshold: stage.threshold });
        stageIdx = (stageIdx + 1) % CC_BONUS_STAGES.length;
      } else {
        ptsInStage += wavePoints;
        wavePoints = 0;
      }
    }

    // Fold CGE-earned silvers into this wave's earned chests
    earnedThisWave.silver = (earnedThisWave.silver || 0) + cgeSilversThisWave;
    earnedFromCGE.silver += cgeSilversThisWave;

    // Add earned chests to the queue for the next wave.
    // Amethyst chests are NOT requeued (they give 0 points), they just accumulate
    // in earnedFromBar to be added to the final total at the end.
    Object.keys(earnedThisWave).forEach(function(k) {
      if (k === 'amethyst') return;
      if (earnedThisWave[k] > 0) queue[k] = (queue[k] || 0) + earnedThisWave[k];
    });
  }

  // Final amethyst count: user's owned + any earned from Mileage (never "opened")
  var amethystFinal = ownedAmethyst + (earnedFromBar.amethyst || 0);

  return {
    totalOpened: totalOpened,
    earnedFromBar: earnedFromBar,
    earnedFromCGE: earnedFromCGE,
    totalPoints: totalPoints,
    stagesCleared: stagesCleared,
    finalStage: stageIdx + 1,
    finalPoints: ptsInStage,
    finalThreshold: CC_BONUS_STAGES[stageIdx].threshold,
    finalReward: CC_BONUS_STAGES[stageIdx].reward,
    trace: trace,
    amethystOwned: ownedAmethyst,
    amethystFinal: amethystFinal,
    // CGE results
    cgeEnabled: cgeEnabled,
    cgeFinalRound: cgeRound,
    cgeFinalPoints: cgePoints,
    cgeTasksCleared: cgeTasksCleared,
    cgeSilverEarned: cgeSilverEarned,
    cgeFinishedAllRounds: cgeFinishedAllRounds
  };
}

// ─── UI ───────────────────────────────────────────────────
function buildChestCalcPanel() {
  var html = '';
  html += '<div class="page-title col-span">Chest Calculator</div>';
  html += '<div class="page-sub col-span">Enter how many of each chest you currently own and where you sit on the Chest Mileage track. The calculator simulates opening every chest, factoring in free chests earned by clearing Mileage stages — and the free chests those rewards generate as you open them. Result shows everything you\'ll walk away with.</div>';

  // Inputs grid: chest counts
  html += '<div class="chest-section">';
  html += '<div class="chest-section-hdr-with-action">';
  html += '<span class="chest-section-title">Owned Chests</span>';
  html += '<button class="chest-reset-inline" onclick="chestCalcReset()" title="Reset all values">🗑 Reset</button>';
  html += '</div>';
  html += '<div class="chest-inputs-grid">';
  CC_CHEST_TYPES.forEach(function(t) {
    html += '<div class="chest-input-card">';
    html += '<img class="chest-img" src="' + t.img + '" alt="' + t.label + '" onerror="this.style.visibility=\'hidden\'">';
    html += '<div class="chest-input-label">' + t.label + '</div>';
    var ptsLabel = t.pts === 0 ? 'Not opened (0 pts)' : (t.pts + ' pt' + (t.pts === 1 ? '' : 's') + ' / open');
    html += '<div class="chest-input-pts">' + ptsLabel + '</div>';
    html += '<input type="number" min="0" step="1" class="chest-input-num" data-key="' + t.key + '" value="' + ((CHEST_STATE.inputs[t.key] || 0) === 0 ? '' : CHEST_STATE.inputs[t.key]) + '" placeholder="0" oninput="chestOnInputChange(this)">';
    html += '</div>';
  });
  html += '</div>';
  html += '</div>';

  // Bonus bar state
  html += '<div class="chest-section">';
  html += '<div class="chest-section-hdr">Current Chest Mileage Progress</div>';
  html += '<div class="chest-bar-state-grid">';
  // Stage dropdown
  html += '<div class="chest-bar-field">';
  html += '<label class="chest-bar-label" for="chest-start-stage">Current Mileage stage</label>';
  var stageOpts = '';
  CC_BONUS_STAGES.forEach(function(s, i) {
    var rewardLabel = s.reward.charAt(0).toUpperCase() + s.reward.slice(1);
    stageOpts += '<option value="' + (i + 1) + '"' + ((i + 1) === CHEST_STATE.startStage ? ' selected' : '') + '>'
              +    'Stage ' + (i + 1) + ' — ' + rewardLabel + ' Chest (needs ' + s.threshold + ' pts)'
              +  '</option>';
  });
  html += '<select id="chest-start-stage" onchange="chestOnStageChange(this)">' + stageOpts + '</select>';
  html += '</div>';
  // Points-in-stage input
  html += '<div class="chest-bar-field">';
  html += '<label class="chest-bar-label" for="chest-start-points">Points already in this stage</label>';
  html += '<input type="number" min="0" step="1" id="chest-start-points" value="' + ((CHEST_STATE.startPoints || 0) === 0 ? '' : CHEST_STATE.startPoints) + '" placeholder="0" oninput="chestOnPointsChange(this)">';
  html += '<div class="chest-bar-hint" id="chest-bar-hint"></div>';
  html += '</div>';
  html += '</div>';
  html += '</div>';

  // ── Chest Growth Event ──
  html += '<div class="chest-section">';
  html += '<div class="chest-section-hdr-toggle">';
  html += '<span>Chest Growth Event</span>';
  html += '<label class="chest-toggle">'
       +    '<input type="checkbox" id="chest-cge-toggle"' + (CHEST_STATE.cgeEnabled ? ' checked' : '') + ' onchange="chestOnCgeToggle(this)">'
       +    '<span class="chest-toggle-slider"></span>'
       +  '</label>';
  html += '</div>';
  html += '<div class="chest-cge-body" id="chest-cge-body" style="display:' + (CHEST_STATE.cgeEnabled ? 'block' : 'none') + '">';
  html += '<div class="chest-cge-desc">When the event is active, opening chests also adds points to this counter. Each round needs 5,000 pts to complete. Tasks fire at 1k / 2k / 3k / 4k / 5k pts (each gives 10 Silver Chests). Overflow carries into the next round. The event runs for 4 rounds.</div>';
  html += '<div class="chest-bar-state-grid">';
  html += '<div class="chest-bar-field">';
  html += '<label class="chest-bar-label" for="chest-cge-round">Current round</label>';
  var roundOpts = '';
  for (var rr = 1; rr <= CGE_TOTAL_ROUNDS; rr++) {
    roundOpts += '<option value="' + rr + '"' + (rr === CHEST_STATE.cgeRound ? ' selected' : '') + '>Round ' + rr + ' of ' + CGE_TOTAL_ROUNDS + '</option>';
  }
  html += '<select id="chest-cge-round" onchange="chestOnCgeRoundChange(this)">' + roundOpts + '</select>';
  html += '</div>';
  html += '<div class="chest-bar-field">';
  html += '<label class="chest-bar-label" for="chest-cge-points">Points already this round</label>';
  html += '<input type="number" min="0" step="1" id="chest-cge-points" value="' + ((CHEST_STATE.cgePoints || 0) === 0 ? '' : CHEST_STATE.cgePoints) + '" placeholder="0" oninput="chestOnCgePointsChange(this)">';
  html += '<div class="chest-bar-hint">Maximum ' + (CGE_ROUND_TOTAL - 1) + ' pts before round completes</div>';
  html += '</div>';
  html += '</div>';
  html += '</div>';
  html += '</div>';

  // Results container
  html += '<div id="chest-results"></div>';

  return html;
}

function chestCalcInit() {
  chestUpdateHint();
  chestCalcRun();
}

function chestOnInputChange(el) {
  var key = el.getAttribute('data-key');
  CHEST_STATE.inputs[key] = Math.max(0, Math.floor(+el.value || 0));
  chestPersist();
  chestCalcRun();
}

function chestOnStageChange(el) {
  CHEST_STATE.startStage = parseInt(el.value, 10) || 1;
  // Clamp startPoints if it now exceeds the new stage's threshold
  var thresh = CC_BONUS_STAGES[CHEST_STATE.startStage - 1].threshold;
  if (CHEST_STATE.startPoints >= thresh) {
    CHEST_STATE.startPoints = thresh - 1;
    var pi = document.getElementById('chest-start-points');
    if (pi) pi.value = CHEST_STATE.startPoints;
  }
  chestPersist();
  chestUpdateHint();
  chestCalcRun();
}

function chestOnPointsChange(el) {
  var val = Math.max(0, Math.floor(+el.value || 0));
  var thresh = CC_BONUS_STAGES[(CHEST_STATE.startStage || 1) - 1].threshold;
  if (val >= thresh) val = thresh - 1; // can't already be full — would have rolled over
  CHEST_STATE.startPoints = val;
  if (val !== (+el.value)) el.value = val;
  chestPersist();
  chestUpdateHint();
  chestCalcRun();
}

function chestOnCgeToggle(el) {
  CHEST_STATE.cgeEnabled = !!el.checked;
  var body = document.getElementById('chest-cge-body');
  if (body) body.style.display = CHEST_STATE.cgeEnabled ? 'block' : 'none';
  chestPersist();
  chestCalcRun();
}

function chestOnCgeRoundChange(el) {
  CHEST_STATE.cgeRound = parseInt(el.value, 10) || 1;
  chestPersist();
  chestCalcRun();
}

function chestOnCgePointsChange(el) {
  var val = Math.max(0, Math.floor(+el.value || 0));
  if (val >= CGE_ROUND_TOTAL) val = CGE_ROUND_TOTAL - 1; // would have rolled over
  CHEST_STATE.cgePoints = val;
  if (val !== (+el.value)) el.value = val;
  chestPersist();
  chestCalcRun();
}

function chestUpdateHint() {
  var hint = document.getElementById('chest-bar-hint');
  if (!hint) return;
  var thresh = CC_BONUS_STAGES[(CHEST_STATE.startStage || 1) - 1].threshold;
  hint.textContent = 'Maximum ' + (thresh - 1) + ' pts before stage completes';
}

function chestCalcReset() {
  CHEST_STATE = {
    inputs: { bronze: 0, silver: 0, gold: 0, pet: 0, amethyst: 0 },
    startStage: 1,
    startPoints: 0,
    cgeEnabled: false,
    cgeRound: 1,
    cgePoints: 0
  };
  chestPersist();
  var el = document.getElementById('panel-chestcalc');
  if (el) {
    var ct = document.getElementById('chestcalc-content');
    if (ct) { ct.innerHTML = buildChestCalcPanel(); }
    chestCalcInit();
  }
}

function chestCalcRun() {
  var ct = document.getElementById('chest-results');
  if (!ct) return;
  var r = chestCalcSimulate(CHEST_STATE);

  function chestImg(key) {
    var t = CC_CHEST_TYPES.filter(function(c){ return c.key === key; })[0];
    return t ? t.img : '';
  }
  function chestLabel(key) {
    var t = CC_CHEST_TYPES.filter(function(c){ return c.key === key; })[0];
    return t ? t.label : key;
  }

  var html = '';

  // Summary cards
  html += '<div class="chest-result-summary">';
  html += '<div class="chest-stat-card"><div class="chest-stat-val">' + r.stagesCleared.toLocaleString() + '</div><div class="chest-stat-lbl">Mileage stages cleared</div></div>';
  html += '<div class="chest-stat-card"><div class="chest-stat-val">' + r.totalPoints.toLocaleString() + '</div><div class="chest-stat-lbl">Total points earned</div></div>';
  // Potential gems — each Amethyst chest gives 4 rolls from this distribution:
  //   50 gems × 30%, 100 × 25%, 200 × 25%, 300 × 10%, 500 × 10%
  // Per roll: min 50, max 500, expected value = 170. Per chest (4 rolls): 200..2000, EV 680.
  var GEM_ROLL_MIN = 50;
  var GEM_ROLL_MAX = 500;
  var GEM_ROLL_EV  = 50*0.30 + 100*0.25 + 200*0.25 + 300*0.10 + 500*0.10; // = 170
  var ROLLS_PER_CHEST = 4;
  var gemsMin = r.amethystFinal * GEM_ROLL_MIN * ROLLS_PER_CHEST;
  var gemsMax = r.amethystFinal * GEM_ROLL_MAX * ROLLS_PER_CHEST;
  var gemsEV  = Math.round(r.amethystFinal * GEM_ROLL_EV * ROLLS_PER_CHEST);
  var gemsDisplay = r.amethystFinal === 0
    ? '0'
    : '~' + gemsEV.toLocaleString();
  var gemsSubLbl = r.amethystFinal === 0
    ? 'No amethyst chests'
    : 'Range: ' + gemsMin.toLocaleString() + '–' + gemsMax.toLocaleString();
  var gemImg = 'https://raw.githubusercontent.com/nakfrg/CapyCalc/main/images/chestcalc/gem_purple.png';
  html += '<div class="chest-stat-card">'
       +    '<div class="chest-stat-val">'
       +      gemsDisplay
       +      (r.amethystFinal > 0 ? ' <img class="chest-gem-img" src="' + gemImg + '" alt="gems" onerror="this.style.display=\'none\'">' : '')
       +    '</div>'
       +    '<div class="chest-stat-lbl">Gems from Amethyst Chests</div>'
       +    '<div class="chest-stat-sub">' + gemsSubLbl + '</div>'
       +  '</div>';
  html += '</div>';

  // Total chests opened breakdown — Amethyst handled separately since it isn't opened
  var showCge = r.cgeEnabled && (r.earnedFromCGE.silver || 0) > 0;
  html += '<div class="chest-section">';
  html += '<div class="chest-section-hdr">Total Chests Opened</div>';
  html += '<table class="chest-result-table">';
  html += '<thead><tr><th></th><th>Chest</th><th>Owned</th><th>Earned from Mileage</th>'
       +    (showCge ? '<th>Earned from Event</th>' : '')
       +    '<th>Total opened</th></tr></thead><tbody>';
  CC_CHEST_TYPES.forEach(function(t) {
    if (t.key === 'amethyst') return; // shown in its own section below
    var owned = CHEST_STATE.inputs[t.key] || 0;
    var earned = r.earnedFromBar[t.key] || 0;
    var earnedCge = (t.key === 'silver') ? (r.earnedFromCGE.silver || 0) : 0;
    var total = r.totalOpened[t.key] || 0;
    if (owned === 0 && earned === 0 && earnedCge === 0 && total === 0) return;
    html += '<tr>';
    html += '<td><img class="chest-img-sm" src="' + t.img + '" alt="" onerror="this.style.visibility=\'hidden\'"></td>';
    html += '<td>' + t.label + '</td>';
    html += '<td class="chest-num">' + owned.toLocaleString() + '</td>';
    html += '<td class="chest-num chest-earned">' + (earned > 0 ? '+' + earned.toLocaleString() : '0') + '</td>';
    if (showCge) {
      html += '<td class="chest-num chest-earned-cge">' + (earnedCge > 0 ? '+' + earnedCge.toLocaleString() : '0') + '</td>';
    }
    html += '<td class="chest-num chest-total">' + total.toLocaleString() + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '</div>';

  // Amethyst total — never opened, just accumulates
  var amethystImg = chestImg('amethyst');
  html += '<div class="chest-section">';
  html += '<div class="chest-section-hdr">Total Amethyst Chests</div>';
  html += '<table class="chest-result-table">';
  html += '<thead><tr><th></th><th>Chest</th><th>Owned</th><th>Earned from Mileage</th><th>Total owned</th></tr></thead><tbody>';
  html += '<tr>';
  html += '<td><img class="chest-img-sm" src="' + amethystImg + '" alt="" onerror="this.style.visibility=\'hidden\'"></td>';
  html += '<td>Amethyst Chest</td>';
  html += '<td class="chest-num">' + r.amethystOwned.toLocaleString() + '</td>';
  html += '<td class="chest-num chest-earned">' + ((r.earnedFromBar.amethyst || 0) > 0 ? '+' + r.earnedFromBar.amethyst.toLocaleString() : '0') + '</td>';
  html += '<td class="chest-num chest-total">' + r.amethystFinal.toLocaleString() + '</td>';
  html += '</tr>';
  html += '</tbody></table>';
  html += '<div class="chest-amethyst-note">Amethyst chests give 0 points, so they\'re not opened during the simulation. Your total is simply owned + earned from Mileage. <br>Each chest grants <b>4 gem rolls</b>: 50 gems (30%), 100 (25%), 200 (25%), 300 (10%), 500 (10%) — averaging <b>170 gems per roll</b> (680 per chest).</div>';
  html += '</div>';

  // Final bar state
  html += '<div class="chest-section">';
  html += '<div class="chest-section-hdr">Final Chest Mileage State</div>';
  var pct = r.finalThreshold > 0 ? (r.finalPoints / r.finalThreshold * 100) : 0;
  html += '<div class="chest-final-bar">';
  html += '<div class="chest-final-bar-info">'
       +    '<div><b>Stage ' + r.finalStage + '</b> — ' + chestLabel(r.finalReward) + ' reward</div>'
       +    '<div class="chest-final-bar-pts">' + r.finalPoints + ' / ' + r.finalThreshold + ' pts</div>'
       +  '</div>';
  html += '<div class="chest-bar-track"><div class="chest-bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>';
  html += '</div>';
  html += '</div>';

  // CGE Final State (if enabled)
  if (r.cgeEnabled) {
    html += '<div class="chest-section">';
    html += '<div class="chest-section-hdr">Final Chest Growth Event State</div>';
    // Summary cards
    html += '<div class="chest-result-summary" style="margin-bottom:14px">';
    html += '<div class="chest-stat-card"><div class="chest-stat-val">' + r.cgeTasksCleared.toLocaleString() + '</div><div class="chest-stat-lbl">Tasks cleared</div></div>';
    html += '<div class="chest-stat-card"><div class="chest-stat-val">+' + r.cgeSilverEarned.toLocaleString() + '</div><div class="chest-stat-lbl">Silver chests earned</div></div>';
    var roundLabel = r.cgeFinishedAllRounds ? 'Event complete' : ('Round ' + r.cgeFinalRound + ' of ' + CGE_TOTAL_ROUNDS);
    html += '<div class="chest-stat-card"><div class="chest-stat-val" style="font-size:16px">' + roundLabel + '</div><div class="chest-stat-lbl">Final position</div></div>';
    html += '</div>';
    // Final progress bar
    if (!r.cgeFinishedAllRounds) {
      var cgePct = (r.cgeFinalPoints / CGE_ROUND_TOTAL) * 100;
      html += '<div class="chest-final-bar">';
      html += '<div class="chest-final-bar-info">'
           +    '<div><b>Round ' + r.cgeFinalRound + '</b> — next task at ' + (function() {
                  for (var i = 0; i < CGE_TASK_THRESHOLDS.length; i++) {
                    if (r.cgeFinalPoints < CGE_TASK_THRESHOLDS[i]) return CGE_TASK_THRESHOLDS[i].toLocaleString() + ' pts';
                  }
                  return 'round complete';
                })() + '</div>'
           +    '<div class="chest-final-bar-pts">' + r.cgeFinalPoints.toLocaleString() + ' / ' + CGE_ROUND_TOTAL.toLocaleString() + ' pts</div>'
           +  '</div>';
      html += '<div class="chest-bar-track"><div class="chest-bar-fill" style="width:' + cgePct.toFixed(1) + '%"></div></div>';
      html += '</div>';
    } else {
      html += '<div class="chest-amethyst-note" style="margin-top:0;border-top:none;padding-top:0">All 4 rounds completed — the Chest Growth Event awards no further chests.</div>';
    }
    html += '</div>';
  }

  // Optional: trace (collapsed) — show the sequence of bars filled
  if (r.trace.length > 0) {
    html += '<details class="chest-trace">';
    html += '<summary>Show step-by-step (' + r.trace.length + ' stages cleared)</summary>';
    html += '<ol class="chest-trace-list">';
    r.trace.forEach(function(e, i) {
      html += '<li>Completed Mileage Stage ' + (e.stageIdx + 1) + ' (' + e.threshold + ' pts) → earned 1 ' + chestLabel(e.reward) + '</li>';
    });
    html += '</ol>';
    html += '</details>';
  }

  ct.innerHTML = html;
}


// On load: build the panel and run init.
document.addEventListener('DOMContentLoaded', function() {
  var el = document.getElementById('chestcalc-content');
  if (el) {
    el.innerHTML = buildChestCalcPanel();
    chestCalcInit();
  }
});
</script>

</body>
</html>
